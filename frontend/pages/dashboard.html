<div class="dashboard-layout">

  <div class="sidebar">

    <div class="profile-section">

      <div class="profile-pic">
        <img id="profileImage" src="assets/default-profile.png" alt="Profile">
      </div>

      <h3 id="sidebarUserName">User Name</h3>

      <p class="edit-profile" onclick="openProfileModal()">
        ✏️ Edit Profile
      </p>

    </div>

    <div class="menu">
      <div class="menu-item active">Dashboard</div>
      <div class="menu-item">Groups</div>
      <div class="menu-item">Savings</div>
      <div class="menu-item">Loans</div>
      <div class="menu-item">Members</div>
      <div class="menu-item">Settings</div>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>

  </div>

  <div class="main-content" id="mainContent">
    <h1>Welcome to NammaKuzhu</h1>
    <p>Select a feature from the left menu.</p>
  </div>

</div>

<div id="profileModal" class="modal-overlay hidden">

  <div class="profile-modal">

    <span class="close-btn" onclick="closeProfileModal()">×</span>

    <h1>Edit Profile</h1>

    <div class="profile-photo-wrapper">
      <img id="modalProfileImage" src="assets/default-profile.png" alt="Profile">

      <div class="camera-icon" onclick="openPhotoOptions()">
        📷
      </div>
    </div>

    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="Phone Number" readonly>
    <input type="date">

    <select>
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>

    <input type="text" placeholder="Address">
    <input type="text" placeholder="Village">
    <input type="text" placeholder="District">
    <input type="text" placeholder="State">
    <input type="text" placeholder="Pincode">
    <input type="text" placeholder="Aadhaar Last 4 Digits">

    <button>Save Profile</button>

  </div>

</div>

<div id="photoOptionsModal" class="modal-overlay hidden">

  <div class="photo-options-box">

    <span class="close-btn" onclick="closePhotoOptions()">×</span>

    <h2>Update Profile Photo</h2>

    <button onclick="chooseFromGallery()">Choose from Gallery</button>
    <button onclick="takePhoto()">Take Current Photo</button>

    <input type="file"
           id="galleryInput"
           accept="image/*"
           class="hidden"
           onchange="previewSelectedImage(event)">

    <input type="file"
           id="cameraInput"
           accept="image/*"
           capture="environment"
           class="hidden"
           onchange="previewSelectedImage(event)">

  </div>

</div>
